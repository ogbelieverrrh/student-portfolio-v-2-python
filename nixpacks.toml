[phases.setup]
nixPkgs = ["python311", "nodejs", "python311Packages.venv"]

[phases.install]
cmds = ["npm install", "python3 -m venv /app/.venv", "source /app/.venv/bin/activate && pip install -r server/requirements.txt"]

[phases.build]
cmds = ["npm run build"]

[env]
SUPABASE_URL = { from = "SUPABASE_URL", default = "" }
SUPABASE_KEY = { from = "SUPABASE_KEY", default = "" }
PORT = { from = "PORT", default = "8000" }

[start]
cmd = "source /app/.venv/bin/activate && cd server && python main.py"]
